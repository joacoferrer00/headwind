version: 2

models:
  - name: stg_openmeteo__weather
    description: >
      Cleaned Open-Meteo hourly weather observations for the top-20 EU hubs, 2019-2022.
      One row per airport per hour. observation_hour is truncated to the hour and used as
      the join key for int_flights_with_weather.
    columns:
      - name: weather_observation_id
        description: Surrogate key (airport_icao + obs_time).
        tests:
          - not_null
          - unique

      - name: airport_icao
        description: ICAO code of the hub airport.
        tests:
          - not_null

      - name: observed_at
        description: UTC timestamp of the observation.
        tests:
          - not_null

      - name: observation_date
        description: Calendar date of the observation.
        tests:
          - not_null

      - name: observation_hour
        description: observed_at truncated to the hour; join key for flights.
        tests:
          - not_null

      - name: temperature_2m
        description: 2m air temperature in degrees Celsius.

      - name: relative_humidity_2m
        description: 2m relative humidity (0-100).

      - name: wind_speed_10m
        description: 10m wind speed in m/s.

      - name: wind_gusts_10m
        description: 10m wind gust speed in m/s.

      - name: wind_direction_10m
        description: 10m wind direction in degrees.

      - name: precipitation
        description: Total precipitation in mm.

      - name: rain
        description: Rain precipitation in mm.

      - name: snowfall
        description: Snowfall in cm.

      - name: snow_depth
        description: Snow depth on the ground in m.

      - name: cloud_cover
        description: Total cloud cover percentage (0-100).

      - name: surface_pressure
        description: Surface pressure in hPa.

name: Pages (dashboard + dbt docs)

# Builds and publishes the public site to GitHub Pages:
#   /            Evidence.dev dashboard (queries the BigQuery marts at build time)
#   /dbt-docs/   dbt documentation and lineage
# Both authenticate to BigQuery with the same Workload Identity Federation as ci.yml.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; do not cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: dbt deps
        working-directory: headwind_dbt
        run: dbt deps

      - name: Generate dbt docs
        working-directory: headwind_dbt
        run: dbt docs generate --target ci

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Evidence dependencies
        working-directory: evidence
        run: npm ci

      - name: Build Evidence sources
        working-directory: evidence
        run: npm run sources

      - name: Build Evidence site
        working-directory: evidence
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p _site/dbt-docs
          cp -r evidence/build/. _site/
          cp headwind_dbt/target/index.html _site/dbt-docs/
          cp headwind_dbt/target/manifest.json _site/dbt-docs/
          cp headwind_dbt/target/catalog.json _site/dbt-docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
